name: iOS release

# Push-button TestFlight release. Either:
#   - click "Run workflow" in the GitHub Actions UI (and pick a bump strategy)
#   - or push a tag matching `ios-v*` to ship automatically.
#
# Prereqs (one-time, GitHub repo settings → Secrets and variables → Actions):
#   APP_STORE_CONNECT_API_KEY_ID         — 10-char key id from App Store Connect
#   APP_STORE_CONNECT_API_ISSUER_ID      — issuer UUID
#   APP_STORE_CONNECT_API_KEY_BASE64     — base64 of the AuthKey_<id>.p8 file
#   FASTLANE_TEAM_ID                     — Apple Developer team id (10 chars)
#
# Code signing: assumes the macOS runner can fetch a signing cert + profile.
# For repeatable CI, add `fastlane match` (see fastlane/README.md) and the
# matching MATCH_PASSWORD / MATCH_GIT_URL secrets.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump strategy"
        type: choice
        required: true
        default: "build"
        options:
          - build
          - patch
          - minor
          - major
          - skip
      lane:
        description: "Fastlane lane to run"
        type: choice
        required: true
        default: "beta"
        options:
          - beta
          - release
  push:
    tags:
      - "ios-v*"

concurrency:
  group: ios-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  testflight:
    name: Build & upload to TestFlight
    runs-on: macos-14
    timeout-minutes: 60

    env:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      FASTLANE_HIDE_CHANGELOG: "1"
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Ruby + bundler cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install Node deps (for @capacitor/cli + cap sync)
        run: npm ci --no-audit --no-fund

      - name: Install fastlane plugins
        run: bundle exec fastlane install_plugins

      - name: Decide bump arg
        id: bump
        run: |
          BUMP="${{ github.event.inputs.bump }}"
          # Tag-triggered runs always do a build-number bump.
          if [ -z "$BUMP" ]; then BUMP="build"; fi
          echo "value=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Run fastlane lane
        run: |
          LANE="${{ github.event.inputs.lane || 'beta' }}"
          BUMP="${{ steps.bump.outputs.value }}"
          if [ "$LANE" = "release" ]; then
            bundle exec fastlane ios release
          elif [ "$BUMP" = "skip" ]; then
            bundle exec fastlane ios beta skip_bump:true
          elif [ "$BUMP" = "build" ]; then
            bundle exec fastlane ios beta
          else
            bundle exec fastlane ios beta bump:$BUMP
          fi

      - name: Commit version bumps back to repo
        # Only commit back on workflow_dispatch from a branch — tag-triggered
        # runs have `github.ref_type == 'tag'` and pushing HEAD to a tag ref
        # would either fail or create a confusing detached commit.
        if: |
          github.event_name == 'workflow_dispatch'
          && github.ref_type == 'branch'
          && github.event.inputs.lane != 'release'
          && github.event.inputs.bump != 'skip'
        run: |
          if git diff --quiet ios/App/App.xcodeproj/project.pbxproj; then
            echo "No version changes to commit."
            exit 0
          fi
          git config user.name  "glev-release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          NEW_VERSION="$(node scripts/bump-ios-version.mjs show | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{const o=JSON.parse(s);process.stdout.write(o.marketingVersion+"("+o.buildNumber+")")})')"
          git add ios/App/App.xcodeproj/project.pbxproj
          git commit -m "chore(ios): release $NEW_VERSION [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Upload .ipa as artifact
        if: always() && github.event.inputs.lane != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/*.ipa
          if-no-files-found: ignore
