name: Android Chrome slider tests

# Guards the SnapSlider slow-drag / pointercancel regression (test 5 in
# tests/e2e/snap-slider.spec.ts) by running Playwright's android-chrome
# project (devices["Pixel 7"] emulation) on every push to main and on
# every pull request.
#
# Required GitHub repository secrets:
#   NEXT_PUBLIC_SUPABASE_URL       — Supabase project URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY  — public anon key (safe to expose in JS)
#   SUPABASE_SERVICE_ROLE_KEY      — service-role key used by global-setup
#                                    to provision the playwright test user
#
# The job installs Playwright's bundled Chromium (--with-deps) so it is
# fully self-contained and does not rely on REPLIT_PLAYWRIGHT_CHROMIUM_EXECUTABLE
# (that env var is only set inside the Replit dev container).

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: android-chrome-slider-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-chrome-slider:
    name: SnapSlider — android-chrome
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PORT: 5000
      PLAYWRIGHT_BASE_URL: http://localhost:5000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium + system deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Install Playwright system deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run android-chrome SnapSlider tests
        run: pnpm exec playwright test --project=android-chrome tests/e2e/snap-slider.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-android-chrome
          path: playwright-report/
          retention-days: 14
