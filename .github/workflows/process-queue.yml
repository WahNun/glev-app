name: Process Replit Queue

# Polls /api/cron/process-queue every minute.
# Claude Desktop creates Asana tasks → webhook writes to replit_queue →
# this cron picks them up, sends the prompt to Claude, and posts the
# response as an Asana comment. Task is only marked "done" after the
# comment is successfully posted.
#
# Setup (one-time):
#   GitHub repo → Settings → Secrets → Actions
#   CRON_SECRET must match the value in Vercel Environment Variables.

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: process-queue
  cancel-in-progress: false

jobs:
  process:
    name: Process
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Hit /api/cron/process-queue
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PROD_APP_URL: ${{ vars.PROD_APP_URL || 'https://glev.app' }}
        run: |
          set -u
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::Repo secret CRON_SECRET not set."
            exit 1
          fi

          url="${PROD_APP_URL%/}/api/cron/process-queue"
          echo "GET -> ${url}"

          response_file="$(mktemp)"
          status=$(curl -sS -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Accept: application/json" \
            -o "${response_file}" \
            -w "%{http_code}" \
            --max-time 120 \
            "${url}" || echo "000")

          echo "HTTP ${status}"
          cat "${response_file}" || true
          echo

          if [ "${status}" != "200" ]; then
            echo "::error::process-queue returned HTTP ${status}"
            exit 1
          fi
