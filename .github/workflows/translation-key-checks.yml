name: Translation key checks

# Runs the pure-function unit tests that verify every translation key
# used in each page exists in both messages/de.json and messages/en.json.
# No dev server is needed — the tests import JSON files directly.
#
# New pages: add a tests/unit/*TranslationKeys.test.ts file and it is
# picked up automatically by the discover job below.
#
# The workflow uses a matrix so each page runs in its own parallel job
# (e.g. "Dashboard", "Engine", "Entries") — failures pinpoint the exact
# page without scanning all output, and total wall-clock time improves on
# parallel runners.
#
# A failed check blocks merge when this workflow is added to the
# repository's branch-protection required-status-checks list.

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: translation-key-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Step 1: find all *TranslationKeys.test.ts files ─────────────────────
  discover:
    name: Discover translation test files
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build matrix JSON
        id: build-matrix
        run: |
          matrix=$(ls tests/unit/*TranslationKeys.test.ts | jq -Rcs '
            split("\n")
            | map(select(. != ""))
            | map({
                file: .,
                name: (
                  split("/")[-1]
                  | sub("TranslationKeys\\.test\\.ts$"; "")
                  | . as $s
                  | ($s[0:1] | ascii_upcase) + $s[1:]
                )
              })
            | {include: .}
          ')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  # ── Step 2: one parallel job per test file ───────────────────────────────
  check:
    name: ${{ matrix.name }}
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.name }} translation key tests
        env:
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
        run: pnpm exec playwright test ${{ matrix.file }}
