name: Translation key checks

# Runs the pure-function unit tests that verify every translation key
# used in the Engine, Dashboard, and Insights pages exists in both
# messages/de.json and messages/en.json.  No dev server is needed —
# the tests import JSON files directly and finish in well under 30 s.
#
# A failed check blocks merge when this workflow is added to the
# repository's branch-protection required-status-checks list.

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: translation-key-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  translation-key-checks:
    name: Translation key checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run translation key unit tests
        env:
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
        run: pnpm exec playwright test tests/unit/engineTranslationKeys.test.ts tests/unit/dashboardTranslationKeys.test.ts tests/unit/insightsTranslationKeys.test.ts
