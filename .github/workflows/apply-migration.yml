name: Apply DB migrations

# Runs automatically after every push to main (which triggers a Vercel
# production deploy) and applies any pending SQL migrations in
# supabase/migrations/ to the production Supabase database.
#
# The script is idempotent: it tracks applied migrations in a
# schema_migrations table and skips files that have already run.
# When there are no new migrations the job finishes in seconds.
#
# ── FIRST-TIME SETUP (run once before enabling automatic mode) ──────────
# Before this workflow can run in --all mode safely on an EXISTING database,
# you must baseline the tracking table so it knows which migrations were
# already applied manually in production.
#
# 1. Add the required repo secrets (see below).
# 2. Go to Actions tab → "Apply DB migrations" → "Run workflow".
# 3. Set mode = baseline and click "Run workflow".
# 4. Verify the job succeeded in the Actions log.
# From this point on, every push to main will automatically apply only
# NEW migration files added after the baseline.
#
# ── ONE-TIME REPO SECRET SETUP ──────────────────────────────────────────
# GitHub → Settings → Secrets and variables → Actions → New repository secret
#
#   SUPABASE_ACCESS_TOKEN
#     A Supabase personal access token (PAT) with permission to run SQL
#     against your project via the Management API.
#     Create one at: https://supabase.com/dashboard/account/tokens
#
#   NEXT_PUBLIC_SUPABASE_URL
#     Your Supabase project URL, e.g. https://abcdefgh.supabase.co
#     This is already a Vercel env var — copy the same value here.
#
# ── MANUAL DISPATCH ─────────────────────────────────────────────────────
# Actions tab → "Apply DB migrations" → "Run workflow"
#   mode = all      (default) — apply pending migrations
#   mode = baseline — first-run only: mark ALL existing files as applied
#                     without executing any SQL (safe on existing prod DB)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mode:
        description: "Migration mode"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - baseline

permissions:
  contents: read

# Never run two migration jobs in parallel — the schema_migrations table
# is not locked between concurrent runs.
concurrency:
  group: apply-migration
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply pending migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::Repo secret SUPABASE_ACCESS_TOKEN is not set."
            echo "::error::Create a token at https://supabase.com/dashboard/account/tokens"
            echo "::error::and add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

          if [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ]; then
            echo "::error::Repo secret NEXT_PUBLIC_SUPABASE_URL is not set."
            echo "::error::Copy the value from Vercel Project Settings → Environment Variables."
            exit 1
          fi

      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          # On push events github.event.inputs is empty → default to "all"
          MIGRATION_MODE: ${{ github.event.inputs.mode || 'all' }}
        run: node scripts/apply-migration.mjs --$MIGRATION_MODE

      - name: Verify tracking table is up to date
        if: ${{ github.event.inputs.mode != 'baseline' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          # Confirm every local .sql file is recorded in schema_migrations.
          # Exits 1 if anything is missing → aborts this job and blocks the
          # GitHub Actions status check so the unapplied migration is visible.
          node scripts/check-migrations.mjs
