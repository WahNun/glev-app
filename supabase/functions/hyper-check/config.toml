[functions.hyper-check]
# No JWT verification — cron-triggered from GitHub Actions without an auth header.
# Without this, Supabase defaults to verify_jwt = true and returns 401 to the cron curl.
verify_jwt = false

# Run every 5 minutes — mirrors hypo-check cadence.
schedule = "*/5 * * * *"

# Required secrets (same as hypo-check — set via Supabase Dashboard → Edge Functions → Secrets):
#
#   iOS (APNs):
#   APNS_KEY_P8    — APNs .p8 private key
#   APNS_KEY_ID    — 10-char key ID
#   APNS_TEAM_ID   — 10-char Apple Team ID
#   APNS_BUNDLE_ID — Must be "com.glev.app"
#
#   Android (FCM HTTP v1):
#   FIREBASE_PROJECT_ID           — Firebase project ID string
#   FIREBASE_SERVICE_ACCOUNT_JSON — Full service account key JSON (single-line string)
#
# SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY are injected automatically.
#
# Deploy command:
#   supabase functions deploy hyper-check
