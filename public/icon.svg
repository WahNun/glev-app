<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 32 32" fill="none" aria-label="Glev">
  <defs>
    <clipPath id="frame"><rect width="32" height="32" rx="9"/></clipPath>
  </defs>
  <rect width="32" height="32" rx="9" fill="#0F0F14"/>
  <g clip-path="url(#frame)">
    <!-- Ring bonds -->
    <line x1="16"    y1="10.5"  x2="20.76" y2="13.25" stroke="#4F6EF7" stroke-width="0.9" stroke-opacity="0.55" stroke-linecap="round"/>
    <line x1="20.76" y1="13.25" x2="20.76" y2="18.75" stroke="#4F6EF7" stroke-width="0.9" stroke-opacity="0.55" stroke-linecap="round"/>
    <line x1="20.76" y1="18.75" x2="16"    y2="21.5"  stroke="#4F6EF7" stroke-width="0.9" stroke-opacity="0.55" stroke-linecap="round"/>
    <line x1="16"    y1="21.5"  x2="11.24" y2="18.75" stroke="#4F6EF7" stroke-width="0.9" stroke-opacity="0.55" stroke-linecap="round"/>
    <line x1="11.24" y1="18.75" x2="11.24" y2="13.25" stroke="#4F6EF7" stroke-width="0.9" stroke-opacity="0.55" stroke-linecap="round"/>
    <line x1="11.24" y1="13.25" x2="16"    y2="10.5"  stroke="#4F6EF7" stroke-width="0.9" stroke-opacity="0.55" stroke-linecap="round"/>
    <!-- Hydroxyls on C1..C4 -->
    <line x1="20.76" y1="13.25" x2="24.5"  y2="10.5"  stroke="#4F6EF7" stroke-width="0.9" stroke-opacity="0.55" stroke-linecap="round"/>
    <line x1="20.76" y1="18.75" x2="24.5"  y2="21.5"  stroke="#4F6EF7" stroke-width="0.9" stroke-opacity="0.55" stroke-linecap="round"/>
    <line x1="16"    y1="21.5"  x2="16"    y2="25.5"  stroke="#4F6EF7" stroke-width="0.9" stroke-opacity="0.55" stroke-linecap="round"/>
    <line x1="11.24" y1="18.75" x2="7.5"   y2="21.5"  stroke="#4F6EF7" stroke-width="0.9" stroke-opacity="0.55" stroke-linecap="round"/>
    <!-- CH2OH tail off C5 -->
    <line x1="11.24" y1="13.25" x2="7.5"   y2="10.5"  stroke="#4F6EF7" stroke-width="0.9" stroke-opacity="0.55" stroke-linecap="round"/>
    <line x1="7.5"   y1="10.5"  x2="4.5"   y2="7.5"   stroke="#4F6EF7" stroke-width="0.9" stroke-opacity="0.55" stroke-linecap="round"/>
    <!-- Ring oxygen O5 (highlighted) -->
    <circle cx="16"    cy="10.5"  r="3.5"  fill="#4F6EF7"/>
    <!-- Ring carbons C1..C5 -->
    <circle cx="20.76" cy="13.25" r="2.2"  fill="#4F6EF740" stroke="#4F6EF7" stroke-width="0.85"/>
    <circle cx="20.76" cy="18.75" r="2.2"  fill="#4F6EF740" stroke="#4F6EF7" stroke-width="0.85"/>
    <circle cx="16"    cy="21.5"  r="2.2"  fill="#4F6EF740" stroke="#4F6EF7" stroke-width="0.85"/>
    <circle cx="11.24" cy="18.75" r="2.2"  fill="#4F6EF740" stroke="#4F6EF7" stroke-width="0.85"/>
    <circle cx="11.24" cy="13.25" r="2.2"  fill="#4F6EF740" stroke="#4F6EF7" stroke-width="0.85"/>
    <!-- Hydroxyls + CH2OH atoms -->
    <circle cx="24.5"  cy="10.5"  r="1.55" fill="#4F6EF730" stroke="#4F6EF7" stroke-width="0.7"/>
    <circle cx="24.5"  cy="21.5"  r="1.55" fill="#4F6EF730" stroke="#4F6EF7" stroke-width="0.7"/>
    <circle cx="16"    cy="25.5"  r="1.55" fill="#4F6EF730" stroke="#4F6EF7" stroke-width="0.7"/>
    <circle cx="7.5"   cy="21.5"  r="1.55" fill="#4F6EF730" stroke="#4F6EF7" stroke-width="0.7"/>
    <circle cx="7.5"   cy="10.5"  r="1.55" fill="#4F6EF730" stroke="#4F6EF7" stroke-width="0.7"/>
    <circle cx="4.5"   cy="7.5"   r="1.55" fill="#4F6EF730" stroke="#4F6EF7" stroke-width="0.7"/>
  </g>
</svg>
