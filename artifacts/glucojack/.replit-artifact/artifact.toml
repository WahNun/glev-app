kind = "web"
previewPath = "/"
title = "GlucoJack"
version = "1.0.0"
id = "artifacts/glucojack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21416

[services.development]
run = "pnpm --filter @workspace/glucojack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/glucojack", "run", "build" ]
publicDir = "artifacts/glucojack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21416"
BASE_PATH = "/"
